<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nominate a Chief Hype Officer — Now Batting</title>
  <meta name="description" content="Make it official. Two fields. One graphic. Send it before the next inning." />
  <link rel="canonical" href="https://nowbattingapp.com/chief-hype-officer/nominate" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nowbattingapp.com/chief-hype-officer/nominate" />
  <meta property="og:title" content="Nominate a Chief Hype Officer — Now Batting" />
  <meta property="og:description" content="Make it official. Two fields. One graphic. Send it before the next inning." />
  <meta property="og:image" content="https://nowbattingapp.com/og-cho.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F6F4EF;
      --bord: rgba(0,0,0,0.09);
      --neon: #DFFF00;
      --daylight: #B8CC00;
      --daylight-dim: #8A9900;
      --txt: #1F1F1F;
      --txt2: #4A4A4A;
      --txt3: #7A7A7A;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--txt);
      font-family: var(--font-sans); font-size: 16px;
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(246,244,239,0.97); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--bord);
    }
    .logo { display: flex; align-items: center; line-height: 1; text-decoration: none; }
    .nav-back {
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      color: var(--txt2); text-decoration: none; transition: color 0.15s;
    }
    .nav-back:hover { color: var(--daylight); }

    /* WAVEFORM LOGO */
    @keyframes idle-1 { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.55);} }
    @keyframes idle-2 { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.62);} }
    @keyframes idle-3 { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.72);} }
    @keyframes idle-4 { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.68);} }
    @keyframes idle-5 { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.70);} }
    @keyframes idle-6 { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.60);} }
    @keyframes idle-7 { 0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.52);} }
    .idle-wave .bar { transform-origin: center bottom; }
    .idle-wave .b1 { animation: idle-1 2.1s ease-in-out 0.0s infinite; }
    .idle-wave .b2 { animation: idle-2 1.9s ease-in-out 0.12s infinite; }
    .idle-wave .b3 { animation: idle-3 1.8s ease-in-out 0.06s infinite; }
    .idle-wave .b4 { animation: idle-4 1.6s ease-in-out 0.0s infinite; }
    .idle-wave .b5 { animation: idle-5 1.7s ease-in-out 0.08s infinite; }
    .idle-wave .b6 { animation: idle-6 1.9s ease-in-out 0.16s infinite; }
    .idle-wave .b7 { animation: idle-7 2.0s ease-in-out 0.04s infinite; }

    /* MAIN */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }

    /* PAGE HEADER */
    .page-eyebrow {
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--daylight); margin-bottom: 14px;
    }
    .page-headline {
      font-size: clamp(32px, 4.5vw, 52px);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1;
      color: var(--txt); margin-bottom: 12px;
    }
    .page-sub {
      font-size: 16px; color: var(--txt3); line-height: 1.6; margin-bottom: 48px;
    }

    /* CANVAS PREVIEW */
    .canvas-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
      position: relative;
    }
    #nomCanvas {
      max-width: 480px;
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      box-shadow: 0 8px 40px rgba(31,31,31,0.18), 0 2px 8px rgba(31,31,31,0.1);
    }
    .canvas-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 16px;
      background: #1F1F1F;
      color: rgba(246,244,239,0.4);
      font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.15em;
    }
    .canvas-loading.hidden { display: none; }

    /* INPUTS */
    .fields {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--txt3);
    }
    .field-input {
      background: rgba(0,0,0,0.04); border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: var(--radius-md); padding: 14px 16px;
      font-family: var(--font-sans); font-size: 16px; color: var(--txt);
      outline: none; transition: border-color 0.2s;
      width: 100%;
    }
    .field-input::placeholder { color: var(--txt3); }
    .field-input:focus { border-color: var(--daylight); }
    .field-hint { font-size: 12px; color: var(--txt3); margin-top: 4px; }

    /* ACTION BUTTONS */
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .act-btn {
      flex: 1;
      font-family: var(--font-sans); font-size: 15px; font-weight: 700;
      padding: 15px 20px; border-radius: var(--radius-md);
      cursor: pointer; transition: transform 0.12s, background 0.15s, border-color 0.15s;
      white-space: nowrap; text-align: center;
      border: 2px solid transparent;
    }
    .act-btn:active { transform: scale(0.97); }
    .act-btn--download {
      background: transparent;
      border-color: rgba(31,31,31,0.22);
      color: var(--txt);
    }
    .act-btn--download:hover { border-color: var(--txt); }
    .act-btn--share {
      background: var(--neon);
      border-color: var(--neon);
      color: #1F1F1F;
    }
    .act-btn--share:hover { background: var(--daylight); border-color: var(--daylight); }

    /* CONFIRMATION */
    .confirm-msg {
      text-align: center;
      font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em;
      color: var(--daylight); text-transform: uppercase;
      opacity: 0; transition: opacity 0.4s;
      min-height: 20px; margin-bottom: 8px;
    }
    .confirm-msg.show { opacity: 1; }

    /* BACK LINK */
    .back-link {
      display: block; text-align: center; margin-top: 24px;
      font-size: 14px; color: var(--txt3); text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--daylight); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--bord); padding: 24px 48px;
      text-align: center; color: var(--txt3); font-size: 12px; margin-top: 40px;
    }
    footer a { color: var(--txt3); text-decoration: none; }
    footer a:hover { color: var(--daylight); }

    /* MOBILE */
    @media (max-width: 600px) {
      nav { padding: 14px 20px; }
      main { padding: 100px 20px 60px; }
      .actions { flex-direction: column; }
      footer { padding: 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .idle-wave .bar { animation: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="logo">
    <svg class="idle-wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" height="28" aria-label="Now Batting">
      <text x="0" y="44" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="36" fill="#1F1F1F" letter-spacing="-1">now</text>
      <circle cx="80.53" cy="30" r="3.5" fill="#1F1F1F"/>
      <rect class="bar b1" x="93.03" y="24" width="6.3" height="12" rx="3.15" fill="#8A9900"/>
      <rect class="bar b2" x="102.83" y="18" width="6.3" height="24" rx="3.15" fill="#8A9900"/>
      <rect class="bar b3" x="112.63" y="10.5" width="7.0" height="39" rx="3.5" fill="#8A9900"/>
      <rect class="bar b4" x="123.13" y="0" width="8.75" height="60" rx="4.38" fill="#B8CC00"/>
      <rect class="bar b5" x="135.38" y="9" width="7.7" height="42" rx="3.85" fill="#8A9900"/>
      <rect class="bar b6" x="146.58" y="16.5" width="6.65" height="27" rx="3.32" fill="#8A9900"/>
      <rect class="bar b7" x="156.73" y="22.5" width="6.65" height="15" rx="3.32" fill="#8A9900"/>
      <circle cx="175.88" cy="30" r="3.5" fill="#1F1F1F"/>
      <text x="188.38" y="44" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="36" fill="#1F1F1F" letter-spacing="-1">batting</text>
    </svg>
  </a>
  <a href="/chief-hype-officer" class="nav-back">← The Chief Hype Officer</a>
</nav>

<main>
  <p class="page-eyebrow">Nominate a Chief Hype Officer</p>
  <h1 class="page-headline">Make it official.</h1>
  <p class="page-sub">Two fields. One graphic. Send it before the next inning.</p>

  <!-- Canvas preview -->
  <div class="canvas-wrap">
    <canvas id="nomCanvas" width="1080" height="1080" aria-label="Nomination card preview"></canvas>
    <div class="canvas-loading" id="canvasLoading">Loading fonts…</div>
  </div>

  <!-- Inputs -->
  <div class="fields">
    <div class="field-group">
      <label class="field-label" for="friendName">Friend's name or @handle</label>
      <input class="field-input" id="friendName" type="text" maxlength="24" placeholder="@mikedonovan" autocomplete="off" spellcheck="false" />
      <span class="field-hint">Max 24 characters</span>
    </div>
    <div class="field-group">
      <label class="field-label" for="teamName">Team name</label>
      <input class="field-input" id="teamName" type="text" maxlength="32" placeholder="Denville Dragons 8U" autocomplete="off" />
      <span class="field-hint">Max 32 characters</span>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="confirm-msg" id="confirmMsg">Sent. They'll know.</div>
  <div class="actions">
    <button class="act-btn act-btn--download" id="btnDownload" onclick="doDownload()">Download PNG</button>
    <button class="act-btn act-btn--share" id="btnShare" onclick="doShare()">Share ↗</button>
  </div>

  <a href="/chief-hype-officer" class="back-link">← Back to the Chief Hype Officer page</a>
</main>

<footer>
  <p>© 2026 Now Batting &nbsp;·&nbsp; <a href="/">Home</a> &nbsp;·&nbsp; <a href="/privacy">Privacy Policy</a></p>
</footer>

<script>
  // ── Analytics ──
  function track(event, props) {
    try { console.log('[analytics]', event, props || ''); } catch(e) {}
  }
  track('nominate_page_view');

  // ── Canvas setup ──
  const canvas = document.getElementById('nomCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  let fontsReady = false;
  let fieldTypedFired = false;

  // ── Font preload — must complete before first draw ──
  async function preloadFonts() {
    await Promise.all([
      document.fonts.load('400 24px Inter'),
      document.fonts.load('700 24px Inter'),
      document.fonts.load('900 24px Inter'),
      document.fonts.load('500 20px "JetBrains Mono"'),
    ]);
  }

  // ── Card renderer ──
  function drawCard(friendRaw, teamRaw) {
    if (!fontsReady) return;

    const CX = W / 2;
    ctx.clearRect(0, 0, W, H);

    // Background with rounded corners
    ctx.fillStyle = '#1F1F1F';
    if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(0, 0, W, H, 32);
      ctx.fill();
    } else {
      ctx.fillRect(0, 0, W, H);
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';

    let y = 108;

    // ── "OFFICIAL NOMINATION" eyebrow ──
    ctx.letterSpacing = '4px';
    ctx.font = '500 22px "JetBrains Mono"';
    ctx.fillStyle = '#B8CC00';
    ctx.fillText('OFFICIAL NOMINATION', CX, y);
    ctx.letterSpacing = '0px';
    y += 38;

    // ── Neon rule ──
    ctx.fillStyle = '#DFFF00';
    ctx.fillRect(CX - 40, y, 80, 2);
    y += 44;

    // ── "I hereby nominate" ──
    ctx.font = '400 34px Inter';
    ctx.fillStyle = 'rgba(246,244,239,0.6)';
    ctx.fillText('I hereby nominate', CX, y);
    y += 64;

    // ── Friend name (auto-scale, uppercase) ──
    const hasFriend = friendRaw && friendRaw.trim().length > 0;
    const nameText = hasFriend ? friendRaw.trim().toUpperCase() : '@YOURFRIEND';
    let nameFontSize = 88;
    ctx.font = `900 ${nameFontSize}px Inter`;
    while (ctx.measureText(nameText).width > 960 && nameFontSize > 48) {
      nameFontSize -= 4;
      ctx.font = `900 ${nameFontSize}px Inter`;
    }
    ctx.fillStyle = hasFriend ? '#DFFF00' : '#666360';
    if (ctx.measureText(nameText).width > 960) {
      let truncated = nameText;
      while (ctx.measureText(truncated + '…').width > 960 && truncated.length > 1) {
        truncated = truncated.slice(0, -1);
      }
      ctx.fillText(truncated + '…', CX, y + nameFontSize);
    } else {
      ctx.fillText(nameText, CX, y + nameFontSize);
    }
    y += nameFontSize + 44;

    // ── "as Chief Hype Officer of the" ──
    ctx.font = '400 34px Inter';
    ctx.fillStyle = 'rgba(246,244,239,0.6)';
    ctx.fillText('as Chief Hype Officer of the', CX, y);
    y += 64;

    // ── Team name (auto-scale) ──
    const hasTeam = teamRaw && teamRaw.trim().length > 0;
    const teamText = hasTeam ? teamRaw.trim() : 'YOUR TEAM';
    let teamFontSize = 46;
    ctx.font = `700 ${teamFontSize}px Inter`;
    while (ctx.measureText(teamText).width > 960 && teamFontSize > 32) {
      teamFontSize -= 2;
      ctx.font = `700 ${teamFontSize}px Inter`;
    }
    ctx.fillStyle = hasTeam ? '#F6F4EF' : '#666360';
    if (ctx.measureText(teamText).width > 960) {
      let truncated = teamText;
      while (ctx.measureText(truncated + '…').width > 960 && truncated.length > 1) {
        truncated = truncated.slice(0, -1);
      }
      ctx.fillText(truncated + '…', CX, y + teamFontSize);
    } else {
      ctx.fillText(teamText, CX, y + teamFontSize);
    }
    y += teamFontSize + 72;

    // ── Gray separator rule ──
    ctx.fillStyle = 'rgba(246,244,239,0.1)';
    ctx.fillRect(108, y, W - 216, 1);
    y += 52;

    // ── "Qualifications:" ──
    ctx.font = '400 24px Inter';
    ctx.fillStyle = '#B4B2A9';
    ctx.fillText('Qualifications:', CX, y);
    y += 52;

    // ── Qual lines ──
    ctx.font = '400 26px Inter';
    ctx.fillStyle = 'rgba(246,244,239,0.82)';
    ctx.fillText('Lawn chair. Wagon. Bluetooth speaker.', CX, y);
    y += 44;
    ctx.fillText('Calm under pressure. Strong opinions.', CX, y);

    // ── Footer ──
    ctx.letterSpacing = '3px';
    ctx.font = '500 16px "JetBrains Mono"';
    ctx.fillStyle = '#B8CC00';
    ctx.fillText('NOWBATTINGAPP.COM', CX, H - 72);
    ctx.letterSpacing = '0px';
  }

  // ── Input handlers ──
  function onInput() {
    if (!fieldTypedFired) {
      fieldTypedFired = true;
      track('nominate_field_typed');
    }
    drawCard(
      document.getElementById('friendName').value,
      document.getElementById('teamName').value
    );
  }

  document.getElementById('friendName').addEventListener('input', onInput);
  document.getElementById('teamName').addEventListener('input', onInput);

  // ── Confirm message helper ──
  let confirmTimer;
  function showConfirm() {
    const el = document.getElementById('confirmMsg');
    el.classList.add('show');
    clearTimeout(confirmTimer);
    confirmTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Download ──
  function doDownload() {
    if (!fontsReady) return;
    const friendName = document.getElementById('friendName').value;
    const teamName = document.getElementById('teamName').value;
    track('nominate_download', {
      friend_name_length: friendName.length,
      team_name_length: teamName.length
    });
    canvas.toBlob((blob) => {
      const slug = (friendName || 'cho').toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 20) || 'cho';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `cho-nomination-${slug}.png`;
      a.click();
      URL.revokeObjectURL(url);
      showConfirm();
    }, 'image/png');
  }

  // ── Share (Web Share API with file, fallback to download) ──
  function doShare() {
    if (!fontsReady) return;
    const friendName = document.getElementById('friendName').value;
    const teamName = document.getElementById('teamName').value;
    track('nominate_share', {
      friend_name_length: friendName.length,
      team_name_length: teamName.length
    });
    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'cho-nomination.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: 'You are the Chief Hype Officer.',
            text: 'Officially nominating you. Read more: nowbattingapp.com/chief-hype-officer'
          });
          track('nominate_share_completed');
          showConfirm();
        } catch (err) {
          if (err.name !== 'AbortError') {
            // User didn't cancel — fall back to download
            triggerDownloadFromBlob(blob, friendName);
          }
        }
      } else {
        triggerDownloadFromBlob(blob, friendName);
        showConfirm();
      }
    }, 'image/png');
  }

  function triggerDownloadFromBlob(blob, friendName) {
    const slug = (friendName || 'cho').toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 20) || 'cho';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cho-nomination-${slug}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Init: preload fonts then render placeholder ──
  (async function init() {
    try {
      await preloadFonts();
    } catch(e) {
      // fonts may be cached or fail gracefully; proceed anyway
    }
    fontsReady = true;
    document.getElementById('canvasLoading').classList.add('hidden');
    drawCard('', '');
  })();
</script>
</body>
</html>
